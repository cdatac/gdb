name: Build
name: Update Barometer

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"   # her gün 09:15 TR (UTC+3)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Repo çek
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python kur
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Bağımlılıklar
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # 4. TÜİK scrape
      - name: Scrape TUİK data
        run: python src/scrape_tuik.py

      # 5. Barometre üret
      - name: Build barometer data
        run: python src/build_tree.py

      # 6. Değişiklikleri commit et
      - name: Commit & push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add docs/data.json data/raw data/cache || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update barometer data"
            git push
          fi
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build tree data
        run: python src/build_tree.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "Update hierarchical barometer data"
          git push
          git push
