name: Build Gokdemir Barometresi

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape TÜİK
        env:
          TUIK_TIMEOUT: "90"
          TUIK_DEBUG: "1"
        run: |
          python src/scrape_tuik.py

      - name: Build tree
        run: |
          python src/build_tree.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/ index.html || true
          git diff --cached --quiet || git commit -m "Update barometer data"
          git push
