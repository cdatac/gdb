name: Build Gokdemir Barometresi

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python src/scrape_tuik.py
        continue-on-error: true

      - name: Build scoring tree
        run: python src/build_tree.py

      - name: Verify output
        run: |
          test -f docs/data.json && echo "docs/data.json OK" || echo "WARN: docs/data.json yok"
          python -c "
          import json, sys
          d = json.load(open('docs/data.json'))
          n = len(d.get('groups', []))
          print(f'Grup sayisi: {n}')
          sys.exit(0)
          "

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data.json data/raw/tuik_latest.json data/cache/tuik_latest.json data/cache/diagnostic_urls.json || true
          git diff --cached --quiet || git commit -m "chore: barometre verisi guncellendi [$(date -u +%Y-%m-%d)]"
          git push
