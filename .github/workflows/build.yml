name: Build Gokdemir Barometresi

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python src/scrape_tuik.py

      - name: Build tree
        run: python src/build_tree.py

      - name: Ensure dist exists
        run: |
          mkdir -p dist
          test -f dist/tree.json

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tuik_families.json dist/tree.json debug || true
          git diff --cached --quiet || git commit -m "Update barometre data"
          git push
