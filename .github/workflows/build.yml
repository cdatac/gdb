name: Update Barometer

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Scrape TUİK data
        run: python src/scrape_tuik.py

      - name: Build barometer data
        run: python src/build_tree.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data.json data/raw data/cache data/debug || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update barometer data"
            git push
          fi
