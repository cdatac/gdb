<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gökdemir Barometresi</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#111a2b;
      --text:#eef4ff;
      --muted:#9eb0cf;
      --line:#243553;
      --high:#ef4444;
      --mid:#f59e0b;
      --accent:#60a5fa;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#0b1220 0%,#0f172a 100%);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:32px 20px 40px}
    .hero{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap}
    h1{margin:0 0 8px;font-size:38px;line-height:1.05}
    .sub{color:var(--muted);font-size:16px}
    .meta{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:16px;padding:12px 16px;color:var(--muted);min-width:220px}
    .grid{display:grid;grid-template-columns:1.3fr .9fr;gap:20px}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
    .card{background:rgba(17,26,43,.95);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.22)}
    .card h2{margin:0 0 14px;font-size:20px}
    .bars{display:flex;flex-direction:column;gap:14px}
    .row{display:grid;grid-template-columns:250px 1fr 56px;gap:14px;align-items:center}
    @media (max-width:700px){.row{grid-template-columns:1fr;gap:8px}}
    .label{font-size:14px;color:#dce8ff}
    .track{height:16px;width:100%;background:#0b1426;border-radius:999px;overflow:hidden;border:1px solid #20304d}
    .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--mid),var(--high));}
    .score{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
    .top3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
    @media (max-width:700px){.top3{grid-template-columns:1fr}}
    .pill{border-radius:18px;padding:14px;background:linear-gradient(180deg, rgba(96,165,250,.12), rgba(255,255,255,.03));border:1px solid var(--line)}
    .pill .rank{color:var(--muted);font-size:12px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em}
    .pill .sector{font-size:16px;font-weight:700;margin-bottom:6px}
    .pill .big{font-size:28px;font-weight:800}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
    th{color:var(--muted);font-weight:600}
    .chg-up{color:#fca5a5;font-weight:700}
    .chg-down{color:#86efac;font-weight:700}
    .chg-flat{color:var(--muted);font-weight:700}
    .foot{margin-top:18px;color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>Gökdemir Barometresi</h1>
        <div class="sub">Veri olan tüm sektörler hesaplanır; aşağıda en riskli 10 sektör gösterilir.</div>
      </div>
      <div class="meta" id="updatedBox">Güncelleniyor…</div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Risk Çubukları</h2>
        <div class="top3" id="top3"></div>
        <div class="bars" id="bars"></div>
      </div>

      <div class="card">
        <h2>Sektör Özeti</h2>
        <table>
          <thead>
            <tr>
              <th>Sektör</th>
              <th>Skor</th>
              <th>Aylık değişim</th>
            </tr>
          </thead>
          <tbody id="summaryBody"></tbody>
        </table>
        <div class="foot">Not: Bu ekran örnek veriyle hazırlanmış görsel MVP’dir. Sonraki adımda gerçek TÜİK/TCMB verisi bağlanır.</div>
      </div>
    </div>
  </div>

  <script>
    function changeClass(v){ if(v > 0) return "chg-up"; if(v < 0) return "chg-down"; return "chg-flat"; }
    function changeText(v){ if(v > 0) return "+" + v; return String(v); }

    fetch("data.json")
      .then(r => r.json())
      .then(data => {
        document.getElementById("updatedBox").textContent = data.subtitle + " • " + data.updated_at;
        const items = data.items.slice().sort((a,b) => b.score - a.score);

        const top3 = document.getElementById("top3");
        items.slice(0,3).forEach((x, i) => {
          const el = document.createElement("div");
          el.className = "pill";
          el.innerHTML = `
            <div class="rank">${i+1}. sıra</div>
            <div class="sector">${x.sector}</div>
            <div class="big">${x.score}</div>
            <div class="${changeClass(x.change)}">Aylık değişim: ${changeText(x.change)}</div>
          `;
          top3.appendChild(el);
        });

        const bars = document.getElementById("bars");
        items.forEach(x => {
          const row = document.createElement("div");
          row.className = "row";
          row.innerHTML = `
            <div class="label">${x.sector}</div>
            <div class="track"><div class="fill" style="width:${x.score}%"></div></div>
            <div class="score">${x.score}</div>
          `;
          bars.appendChild(row);
        });

        const body = document.getElementById("summaryBody");
        items.forEach(x => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><strong>${x.sector}</strong><br><span style="color:#9eb0cf">${x.reason}</span></td>
            <td>${x.score}</td>
            <td class="${changeClass(x.change)}">${changeText(x.change)}</td>
          `;
          body.appendChild(tr);
        });
      });
  </script>
</body>
</html>
