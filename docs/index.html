<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gökdemir Barometresi</title>
  <style>
    :root{
      --bg:#07111f;
      --panel:#0f1b31;
      --panel2:#132340;
      --line:#22385d;
      --text:#eef4ff;
      --muted:#a9bbd8;
      --accent:#62a8ff;
      --warn:#f59e0b;
      --danger:#ef4444;
      --ok:#22c55e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter, Arial, sans-serif;
      background:linear-gradient(180deg,#07111f 0%, #0b1730 100%);
      color:var(--text);
    }
    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:24px;
    }
    .hero{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
      margin-bottom:20px;
      flex-wrap:wrap;
    }
    h1{
      margin:0 0 8px;
      font-size:54px;
      line-height:1;
    }
    .sub{
      color:var(--muted);
      font-size:18px;
    }
    .meta{
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:20px;
      padding:14px 18px;
      color:var(--text);
      font-size:18px;
    }
    .layout{
      display:grid;
      grid-template-columns:1.45fr .95fr;
      gap:22px;
    }
    @media (max-width: 1100px){
      .layout{grid-template-columns:1fr}
    }
    .card{
      background:rgba(15,27,49,.96);
      border:1px solid var(--line);
      border-radius:28px;
      padding:22px;
      box-shadow:0 14px 40px rgba(0,0,0,.25);
    }
    .card h2{
      margin:0 0 18px;
      font-size:24px;
    }
    .top3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-bottom:20px;
    }
    @media (max-width: 900px){
      .top3{grid-template-columns:1fr}
    }
    .mini{
      background:linear-gradient(180deg, rgba(98,168,255,.12), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
    }
    .mini .rank{
      color:var(--muted);
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:8px;
    }
    .mini .sector{
      font-size:17px;
      font-weight:700;
      margin-bottom:12px;
    }
    .mini .score{
      font-size:52px;
      font-weight:800;
      line-height:1;
      margin-bottom:8px;
    }
    .up{color:#fda4af;font-weight:700}
    .down{color:#86efac;font-weight:700}
    .flat{color:var(--muted);font-weight:700}

    .group{
      border-top:1px solid rgba(255,255,255,.04);
      padding-top:12px;
      margin-top:12px;
    }
    .group:first-of-type{
      border-top:none;
      padding-top:0;
      margin-top:0;
    }
    .group-header{
      width:100%;
      background:transparent;
      border:none;
      color:inherit;
      padding:0;
      cursor:pointer;
      text-align:left;
    }
    .group-row{
      display:grid;
      grid-template-columns:300px 1fr 56px 30px;
      gap:16px;
      align-items:center;
      padding:8px 0;
    }
    @media (max-width: 900px){
      .group-row{
        grid-template-columns:1fr;
        gap:8px;
      }
    }
    .group-name{
      font-size:17px;
      font-weight:700;
    }
    .track{
      width:100%;
      height:18px;
      border:1px solid #284167;
      background:#08152a;
      border-radius:999px;
      overflow:hidden;
    }
    .fill{
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, #63a9ff 0%, #f59e0b 55%, #ef4444 100%);
    }
    .score{
      font-size:18px;
      font-weight:800;
      text-align:right;
    }
    .arrow{
      font-size:20px;
      color:var(--muted);
      text-align:right;
    }
    .children{
      display:none;
      padding:10px 0 2px 18px;
      border-left:2px solid rgba(98,168,255,.18);
      margin:8px 0 0 8px;
    }
    .children.open{
      display:block;
    }
    .child-row{
      display:grid;
      grid-template-columns:270px 1fr 56px;
      gap:14px;
      align-items:center;
      padding:8px 0;
    }
    @media (max-width: 900px){
      .child-row{
        grid-template-columns:1fr;
        gap:8px;
      }
    }
    .child-name{
      color:#dce8ff;
      font-size:15px;
    }
    .child-reason{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      font-size:15px;
    }
    th,td{
      text-align:left;
      padding:12px 10px;
      border-bottom:1px solid var(--line);
      vertical-align:top;
    }
    th{
      color:var(--muted);
      font-weight:700;
    }
    .reason{
      color:var(--muted);
      margin-top:4px;
    }
    .foot{
      margin-top:16px;
      color:var(--muted);
      font-size:13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>Gökdemir Barometresi</h1>
        <div class="sub">Ana sektöre tıklayınca alt sektörler en riskliden en düşüğe açılır.</div>
      </div>
      <div class="meta" id="metaBox">Yükleniyor…</div>
    </div>

    <div class="layout">
      <div class="card">
        <h2>Risk Çubukları</h2>
        <div class="top3" id="top3"></div>
        <div id="groups"></div>
      </div>

      <div class="card">
        <h2>Sektör Özeti</h2>
        <table>
          <thead>
            <tr>
              <th>Ana sektör</th>
              <th>Skor</th>
              <th>Aylık değişim</th>
            </tr>
          </thead>
          <tbody id="summaryBody"></tbody>
        </table>
        <div class="foot">Not: Bu sürüm hiyerarşik görsel MVP’dir. Sonraki adımda otomatik scraping ile gerçek veriye bağlanacaktır.</div>
      </div>
    </div>
  </div>

  <script>
    function changeClass(v){
      if(v > 0) return "up";
      if(v < 0) return "down";
      return "flat";
    }
    function changeText(v){
      return v > 0 ? `+${v}` : `${v}`;
    }

    fetch("data.json")
      .then(r => r.json())
      .then(data => {
        const groups = (data.groups || []).slice().sort((a,b) => b.score - a.score);

        document.getElementById("metaBox").textContent =
          `${data.subtitle} • ${data.updated_at}`;

        const top3 = document.getElementById("top3");
        groups.slice(0,3).forEach((g, i) => {
          const el = document.createElement("div");
          el.className = "mini";
          el.innerHTML = `
            <div class="rank">${i+1}. sıra</div>
            <div class="sector">${g.name}</div>
            <div class="score">${g.score}</div>
            <div class="${changeClass(g.change)}">Aylık değişim: ${changeText(g.change)}</div>
          `;
          top3.appendChild(el);
        });

        const groupsWrap = document.getElementById("groups");

        groups.forEach((g, idx) => {
          const children = (g.children || []).slice().sort((a,b) => b.score - a.score);

          const group = document.createElement("div");
          group.className = "group";

          const btn = document.createElement("button");
          btn.className = "group-header";
          btn.innerHTML = `
            <div class="group-row">
              <div class="group-name">${g.name}</div>
              <div class="track"><div class="fill" style="width:${g.score}%"></div></div>
              <div class="score">${g.score}</div>
              <div class="arrow">${idx < 3 ? "▾" : "▸"}</div>
            </div>
          `;

          const childBox = document.createElement("div");
          childBox.className = "children" + (idx < 3 ? " open" : "");

          children.forEach(c => {
            const row = document.createElement("div");
            row.className = "child-row";
            row.innerHTML = `
              <div>
                <div class="child-name">${c.name}</div>
                <div class="child-reason">${c.reason}</div>
              </div>
              <div class="track"><div class="fill" style="width:${c.score}%"></div></div>
              <div class="score">${c.score}</div>
            `;
            childBox.appendChild(row);
          });

          btn.addEventListener("click", () => {
            childBox.classList.toggle("open");
            btn.querySelector(".arrow").textContent =
              childBox.classList.contains("open") ? "▾" : "▸";
          });

          group.appendChild(btn);
          group.appendChild(childBox);
          groupsWrap.appendChild(group);
        });

        const body = document.getElementById("summaryBody");
        groups.forEach(g => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>
              <strong>${g.name}</strong>
              <div class="reason">${g.reason}</div>
            </td>
            <td>${g.score}</td>
            <td class="${changeClass(g.change)}">${changeText(g.change)}</td>
          `;
          body.appendChild(tr);
        });
      });
  </script>
</body>
</html>
  </script>
</body>
</html>
